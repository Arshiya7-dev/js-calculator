<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="asset/stylesheet/main.css">
</head>

<body>
    <div class="calc-box">
        <div class="title">Calculator</div>
        <div class="inputs">
            <input type="text" placeholder="num1">
            <input type="text" placeholder="num2">
        </div>
        <div class="ops">
            <button onclick="myCalc('+', this)">+</button>
            <button onclick="myCalc('-', this)">-</button>
            <button onclick="myCalc('/', this)">/</button>
            <button onclick="myCalc('*', this)">*</button>
        </div>
        <button class="equals-btn" onclick="sum()">=</button>
        <h1></h1>
    </div>
    <script src="asset/js/master.js"></script>

</body>

</html>
